<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CentryAI — Stop Paying for Apps You've Forgotten</title>
<meta name="description" content="CentryAI automatically detects every subscription, flags unused ones, and helps you cancel — for free. Take control of your recurring spend."/>
<link rel="stylesheet" href="shared.css?v=7"/>
<link rel="icon" type="image/svg+xml" href="logo.svg"/>
<script src="langswitcher.js?v=7"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* ════════════════════════════════════════
   HERO  (with video background)
════════════════════════════════════════ */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  padding: 90px 2rem 5rem;
  position: relative;
  overflow: hidden;
}

/* Video background */
.hero-video-bg {
  position: absolute; inset: 0; z-index: 0;
  overflow: hidden;
}
.hero-video-bg video {
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 0.12;
  mix-blend-mode: screen;
}
.hero-video-bg::after {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 60% 70% at 50% 100%, var(--bg) 0%, transparent 70%),
    radial-gradient(ellipse 100% 30% at 50% 0%, var(--bg) 0%, transparent 80%),
    linear-gradient(to right, var(--bg) 0%, transparent 35%, transparent 65%, var(--bg) 100%);
}

.hero-bg {
  position: absolute; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 70% 55% at 68% 42%, rgba(101,93,249,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 18% 75%, rgba(56,189,248,0.04) 0%, transparent 55%);
  pointer-events: none;
}
.hero-grid {
  position: absolute; inset: 0; z-index: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 56px 56px;
  mask-image: radial-gradient(ellipse 75% 75% at 65% 28%, black 0%, transparent 68%);
  opacity: 0.4;
  pointer-events: none;
}
.hero-inner {
  max-width: 1200px; margin: 0 auto; width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5rem;
  align-items: center;
  position: relative; z-index: 1;
}

/* Badge */
.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 14px;
  border-radius: 100px;
  background: var(--accent-dim);
  border: 1px solid rgba(101,93,249,0.3);
  font-size: 0.76rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: 1.75rem;
  animation: fadeUp 0.5s ease both;
}
.hero-badge-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
  animation: pulseDot 2s ease infinite;
}
@keyframes pulseDot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

/* Headline */
.hero h1 {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: clamp(2.4rem, 4.2vw, 3.5rem);
  line-height: 1.1;
  letter-spacing: -0.035em;
  margin-bottom: 1.35rem;
  animation: fadeUp 0.6s 0.1s ease both;
  color: var(--fg);
}
.hero h1 em {
  font-style: normal;
  background: var(--brand-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-sub {
  color: var(--fg2);
  font-size: 1.05rem;
  font-weight: 450;
  line-height: 1.8;
  max-width: 420px;
  margin-bottom: 2.5rem;
  animation: fadeUp 0.6s 0.2s ease both;
}

/* ── Store Buttons ── */
.hero-ctas {
  display: flex; gap: 12px; flex-wrap: wrap;
  animation: fadeUp 0.6s 0.3s ease both;
}
.btn-store {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 11px 20px;
  border-radius: 12px;
  font-family: 'Manrope', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  text-decoration: none;
  border: none;
  cursor: pointer;
  transition: all 0.22s;
}
.btn-store-apple {
  background: #000;
  color: #fff;
  border: 1px solid rgba(255,255,255,0.15);
}
[data-theme="light"] .btn-store-apple {
  background: #000;
  color: #fff;
}
.btn-store-apple:hover {
  background: #1a1a1a;
  transform: translateY(-2px);
  box-shadow: 0 14px 36px rgba(0,0,0,0.4);
}
.btn-store-google {
  background: #fff;
  color: #1f1f1f;
  border: 1px solid rgba(0,0,0,0.12);
}
[data-theme="light"] .btn-store-google {
  border-color: rgba(0,0,0,0.15);
}
.btn-store-google:hover {
  background: #f5f5f5;
  transform: translateY(-2px);
  box-shadow: 0 14px 36px rgba(0,0,0,0.15);
}
.btn-store-logo { width: 22px; height: 22px; display: block; flex-shrink: 0; }
.btn-store-text { display: flex; flex-direction: column; line-height: 1.25; }
.btn-store-small { font-size: 0.64rem; font-weight: 500; opacity: 0.7; }
.btn-store-name { font-size: 0.92rem; font-weight: 800; }

/* Trust line */
.hero-trust {
  margin-top: 1.75rem;
  color: var(--fg3);
  font-size: 0.82rem;
  font-weight: 500;
  display: flex; align-items: center; gap: 1rem;
  animation: fadeUp 0.6s 0.4s ease both;
}
.hero-trust-stars { color: #f59e0b; letter-spacing: 2px; }

/* ── iPhone 17 Pro Max SVG frame ── */
.phone-gallery {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: -20px;
  position: relative;
  animation: fadeIn 0.9s 0.3s ease both;
}
.phone-glow {
  position: absolute;
  width: 320px; height: 320px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(101,93,249,0.2) 0%, transparent 70%);
  z-index: 0;
  pointer-events: none;
}

/* iPhone 17 Pro SVG wrapper */
.iphone17-main {
  width: 260px;
  position: relative; z-index: 2;
  transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  filter: drop-shadow(0 50px 90px rgba(0,0,0,0.8)) drop-shadow(0 10px 30px rgba(0,0,0,0.5));
}
.iphone17-main:hover { transform: translateY(-10px) rotate(-1deg) scale(1.02); }
.iphone17-side {
  width: 210px;
  opacity: 0.55;
  position: relative; z-index: 1;
  transform: scale(0.85) translateX(10px);
  filter: drop-shadow(0 30px 60px rgba(0,0,0,0.6));
}

/* ════════════════════════════════════════
   STATS BAR
════════════════════════════════════════ */
.stats-bar {
  background: var(--bg2);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 3rem 2rem;
}
.stats-bar-inner {
  max-width: 1100px; margin: 0 auto;
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 2rem; text-align: center;
}
.stat-num {
  font-family: 'Manrope', sans-serif;
  font-size: 2.2rem; font-weight: 800;
  color: var(--accent);
  line-height: 1.1;
  letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
}
.stat-label { font-size: 0.82rem; font-weight: 500; color: var(--fg3); margin-top: 6px; }

/* ════════════════════════════════════════
   SECTIONS
════════════════════════════════════════ */
.section { padding: 7rem 2rem; }
.section-inner { max-width: 1100px; margin: 0 auto; }
.section-eyebrow {
  display: inline-block;
  font-size: 0.72rem; font-weight: 800;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 1rem;
}
.section-title {
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: clamp(1.8rem, 3vw, 2.6rem);
  letter-spacing: -0.035em; line-height: 1.12;
  margin-bottom: 1rem; color: var(--fg);
}
.section-sub {
  color: var(--fg2); font-size: 1rem; font-weight: 450;
  max-width: 520px; line-height: 1.8;
}

/* ════════════════════════════════════════
   FEATURES GRID
════════════════════════════════════════ */
.features-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 1.5px; background: var(--border);
  border-radius: var(--radius-lg); overflow: hidden; margin-top: 4rem;
}
.feature-card {
  background: var(--surface); padding: 2.75rem;
  position: relative; overflow: hidden; transition: background 0.2s;
}
.feature-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
  opacity: 0; transition: opacity 0.3s;
}
.feature-card:hover { background: var(--surface2); }
.feature-card:hover::before { opacity: 1; }
.feature-icon {
  width: 50px; height: 50px; border-radius: 13px;
  background: var(--accent-dim); border: 1px solid rgba(101,93,249,0.2);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 1.5rem;
  transition: transform 0.3s, box-shadow 0.3s;
}
.feature-icon svg {
  width: 24px; height: 24px;
  stroke: var(--accent); fill: none;
  stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round;
}
.feature-card:hover .feature-icon {
  transform: scale(1.08);
  box-shadow: 0 0 24px var(--accent-glow);
}
.feature-card h3 {
  font-family: 'Manrope', sans-serif; font-weight: 800;
  font-size: 1.05rem; margin-bottom: 0.6rem; letter-spacing: -0.01em;
}
.feature-card p { color: var(--fg2); font-size: 0.88rem; line-height: 1.8; font-weight: 450; font-family: 'Inter', sans-serif; }

/* ════════════════════════════════════════
   APP SCREENSHOTS SECTION
════════════════════════════════════════ */
.screenshots-section { padding: 7rem 0 5rem; overflow: hidden; }
.screenshots-scroll-wrap { margin-top: 3.5rem; position: relative; }
.screenshots-track {
  display: flex; gap: 24px;
  overflow-x: auto; scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
  padding: 30px max(2rem, calc((100vw - 1100px) / 2)) 2.5rem;
  min-height: 620px;   /* bölüm yüksekliği */
}
.screenshots-track::-webkit-scrollbar { display: none; }
.screenshot-slide { flex: 0 0 auto; scroll-snap-align: center; width: 240px; }
.screenshot-slide-frame {
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), filter 0.3s ease;
  filter: drop-shadow(0 28px 56px rgba(0,0,0,0.6));
  transform-origin: bottom center;
}
.screenshot-slide-frame:hover {
  transform: translateY(-14px) scale(1.05);
  filter: drop-shadow(0 44px 72px rgba(0,0,0,0.78));
}
.screenshot-caption {
  text-align: center; margin-top: 1.2rem;
  font-size: 0.8rem; font-weight: 600; color: var(--fg3);
}
/* Prev / Next arrow buttons */
.screenshots-nav {
  display: flex; justify-content: center; align-items: center; gap: 16px;
  margin-top: 1.5rem;
}
.screenshots-arrow {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--fg2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; transition: all 0.2s;
  flex-shrink: 0;
}
.screenshots-arrow:hover {
  background: var(--surface2); color: var(--fg);
  border-color: var(--accent);
  transform: scale(1.08);
}
.screenshots-dots-row {
  display: flex; align-items: center; gap: 7px;
}
.screenshots-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--border2); transition: all 0.3s;
  cursor: pointer; border: none;
}
.screenshots-dot.active { background: var(--accent); width: 22px; border-radius: 4px; }

/* ════════════════════════════════════════
   HOW IT WORKS
════════════════════════════════════════ */
.how-section { background: var(--bg2); }
.steps {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 2.5rem; margin-top: 4rem; position: relative;
}
.steps::before {
  content: '';
  position: absolute; top: 28px;
  left: calc(16.6% + 24px); right: calc(16.6% + 24px);
  height: 1px;
  background: linear-gradient(90deg, var(--accent), var(--teal));
  opacity: 0.35;
}
.step { text-align: center; position: relative; }
.step-num {
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--surface); border: 1.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1.5rem;
  font-family: 'Manrope', sans-serif; font-size: 0.95rem; font-weight: 800;
  color: var(--accent); position: relative; z-index: 1;
}
.step h3 { font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 1rem; margin-bottom: 0.6rem; }
.step p { color: var(--fg2); font-size: 0.875rem; line-height: 1.8; font-weight: 450; }

/* ════════════════════════════════════════
   ZOMBIE CALLOUT
════════════════════════════════════════ */
.zombie-callout {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius-lg); padding: 3.5rem; margin-top: 4rem;
  display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center;
}
.zombie-label {
  display: inline-flex; align-items: center; gap: 8px; padding: 5px 12px;
  border-radius: 6px; background: var(--red-dim); border: 1px solid rgba(248,113,113,0.25);
  color: var(--red); font-size: 0.72rem; font-weight: 800;
  letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 1.25rem;
}
.zombie-callout h2 {
  font-family: 'Manrope', sans-serif; font-weight: 800;
  font-size: 1.7rem; letter-spacing: -0.03em; margin-bottom: 0.85rem; line-height: 1.2;
}
.zombie-callout p { color: var(--fg2); font-size: 0.92rem; line-height: 1.85; font-weight: 450; }
.zombie-subs { display: flex; flex-direction: column; gap: 10px; }
.zombie-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 11px; padding: 12px 16px; transition: border-color 0.2s;
}
.zombie-item.flagged { border-color: rgba(248,113,113,0.28); background: rgba(248,113,113,0.04); }
.zombie-item-logo {
  width: 36px; height: 36px; border-radius: 9px;
  flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center;
}
.zombie-item-logo img { width: 100%; height: 100%; object-fit: contain; border-radius: 9px; display: block; }
.zombie-item-logo-svg {
  width: 36px; height: 36px; border-radius: 9px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
}
.zombie-item-info { flex: 1; }
.zombie-item-name { font-weight: 700; font-size: 0.85rem; }
.zombie-item-sub { font-size: 0.72rem; color: var(--fg3); margin-top: 2px; }
.zombie-item-price { font-family: 'Manrope', sans-serif; font-size: 0.85rem; font-weight: 600; color: var(--fg2); font-variant-numeric: tabular-nums; }
.zombie-flag {
  background: var(--red-dim); border: 1px solid rgba(248,113,113,0.35);
  color: var(--red); font-size: 0.58rem; font-weight: 800;
  letter-spacing: 0.07em; padding: 3px 7px; border-radius: 5px; text-transform: uppercase;
}

/* ════════════════════════════════════════
   TESTIMONIALS
════════════════════════════════════════ */
.testimonials-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1.5rem; margin-top: 3.5rem;
}
.testimonial-card {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius-lg); padding: 2rem;
  transition: transform 0.25s, box-shadow 0.25s;
}
.testimonial-card:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(0,0,0,0.25); }
.testimonial-stars { color: #f59e0b; font-size: 0.88rem; margin-bottom: 1rem; }
.testimonial-text { font-size: 0.9rem; color: var(--fg2); line-height: 1.8; margin-bottom: 1.5rem; font-style: italic; font-weight: 450; }
.testimonial-author { display: flex; align-items: center; gap: 10px; }
.testimonial-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--brand-gradient);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.72rem; font-weight: 800; color: white; flex-shrink: 0;
}
.testimonial-name { font-weight: 700; font-size: 0.875rem; }
.testimonial-handle { font-size: 0.75rem; color: var(--fg3); margin-top: 1px; }

/* ════════════════════════════════════════
   FAQ
════════════════════════════════════════ */
.faq-section { background: var(--bg2); }
.faq-list { max-width: 700px; margin: 3.5rem auto 0; }
.faq-item { border-bottom: 1px solid var(--border); }
.faq-question {
  display: flex; justify-content: space-between; align-items: center;
  padding: 1.35rem 0; cursor: pointer; font-weight: 700; font-size: 0.95rem;
  gap: 1rem; transition: color 0.2s; user-select: none;
}
.faq-question:hover { color: var(--accent); }
.faq-chevron {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; flex-shrink: 0;
  transition: transform 0.3s, background 0.2s; color: var(--fg3);
}
.faq-chevron.open { transform: rotate(180deg); background: var(--accent-dim); color: var(--accent); }
.faq-answer { max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s ease; }
.faq-answer.open { max-height: 300px; padding-bottom: 1.35rem; }
.faq-answer p { color: var(--fg2); font-size: 0.9rem; line-height: 1.85; font-weight: 450; }

/* ════════════════════════════════════════
   GOOGLE DATA DISCLOSURE
════════════════════════════════════════ */
.google-disclosure {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-lg);
  padding: 2.75rem 3rem;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 2rem;
  align-items: flex-start;
  max-width: 820px;
  margin: 0 auto;
}
.google-disclosure-icon {
  width: 52px; height: 52px; border-radius: 14px;
  background: var(--accent-dim);
  border: 1px solid rgba(101,93,249,0.2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.google-disclosure-icon svg {
  width: 26px; height: 26px;
  stroke: var(--accent); fill: none;
  stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round;
}
.google-disclosure h3 {
  font-family: 'Manrope', sans-serif;
  font-weight: 800; font-size: 1.05rem;
  letter-spacing: -0.01em; margin-bottom: 0.75rem;
  color: var(--fg);
}
.google-disclosure p {
  color: var(--fg2); font-size: 0.88rem;
  line-height: 1.85; font-weight: 450;
  font-family: 'Inter', sans-serif;
}
@media (max-width: 600px) {
  .google-disclosure { grid-template-columns: 1fr; padding: 2rem; }
  .google-disclosure-icon { display: none; }
}

/* ════════════════════════════════════════
   CTA BANNER
════════════════════════════════════════ */
.cta-section { padding: 7rem 2rem; }
.cta-inner {
  max-width: 780px; margin: 0 auto; text-align: center;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 28px; padding: 5rem 3rem;
  position: relative; overflow: hidden;
}
.cta-inner::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse 75% 55% at 50% 0%, rgba(101,93,249,0.15), transparent 60%);
  pointer-events: none;
}
.cta-inner h2 {
  font-family: 'Manrope', sans-serif; font-weight: 800;
  font-size: clamp(1.8rem, 3vw, 2.4rem); letter-spacing: -0.035em;
  margin-bottom: 0.85rem; position: relative; color: var(--fg);
}
.cta-inner p {
  color: var(--fg2); font-size: 1rem; margin-bottom: 2.5rem;
  position: relative; font-weight: 450; line-height: 1.75;
}
.cta-btns { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; position: relative; }

/* ════════════════════════════════════════
   RESPONSIVE
════════════════════════════════════════ */
@media (max-width: 960px) {
  .hero-inner { grid-template-columns: 1fr; text-align: center; gap: 3rem; }
  .hero-sub { margin: 0 auto 2.5rem; }
  .hero-ctas { justify-content: center; }
  .hero-trust { justify-content: center; }
  .phone-gallery { margin-top: 1rem; }

/* ── StatBar ── */
function StatBar() {
  const [counted, setCounted] = useState(false);
  const ref = useRef(null);
  const [vals, setVals] = useState([0, 0, 0, 0]);
  const targets = [240000, 47, 4.8, 2400000];
  const formats = [
    v => (v/1000).toFixed(0)+'K+',
    v => '$'+v,
    v => v.toFixed(1)+'★',
    v => '$'+(v/1000000).toFixed(1)+'M+'
  ];
  const labels = ['Downloads', 'Avg. monthly waste found', 'App Store rating', 'User savings tracked'];

  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !counted) {
        setCounted(true);
        const dur = 1400, steps = 50, interval = dur / steps;
        let step = 0;
        const t = setInterval(() => {
          step++;
          const ease = 1 - Math.pow(1 - step / steps, 3);
          setVals(targets.map(t => Math.round(t * ease)));
          if (step >= steps) clearInterval(t);
        }, interval);
      }
    }, { threshold: 0.4 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [counted]);

  return (
    <div className="stats-bar" ref={ref}>
      <div className="stats-bar-inner">
        {labels.map((label, i) => (
          <div key={i}>
            <div className="stat-num">{formats[i](vals[i])}</div>
            <div className="stat-label">{label}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── Screenshots section: infinite loop carousel ── */
function ScreenshotsSection() {
  const n = SCREENSHOTS.length;
  // klonlanmış liste: son 2 öğe başa, ilk 2 öğe sona — infinite illusion
  const slides = [
    ...SCREENSHOTS.slice(-2),
    ...SCREENSHOTS,
    ...SCREENSHOTS.slice(0, 2),
  ];
  const SLIDE_W = 240 + 24; // width + gap
  const OFFSET  = 2;        // clone count at start

  const [active, setActive] = useState(0); // 0-indexed into SCREENSHOTS
  const trackRef = useRef(null);
  const isJumping = useRef(false);

  // Position track at real slide i (without animation)
  const jumpTo = (realIdx) => {
    if (!trackRef.current) return;
    trackRef.current.scrollLeft = (realIdx + OFFSET) * SLIDE_W;
  };

  const scrollToReal = (realIdx) => {
    if (!trackRef.current) return;
    trackRef.current.scrollTo({ left: (realIdx + OFFSET) * SLIDE_W, behavior: 'smooth' });
    setActive(realIdx);
  };

  // Jump’less wrap-around after transition ends
  const handleScroll = () => {
    if (isJumping.current || !trackRef.current) return;
    const rawIdx = Math.round(trackRef.current.scrollLeft / SLIDE_W);
    const realIdx = rawIdx - OFFSET;

    if (realIdx < 0) {
      isJumping.current = true;
      const wrapped = n + realIdx;
      jumpTo(wrapped);
      setActive(((wrapped % n) + n) % n);
      setTimeout(() => { isJumping.current = false; }, 50);
    } else if (realIdx >= n) {
      isJumping.current = true;
      const wrapped = realIdx - n;
      jumpTo(wrapped);
      setActive(wrapped % n);
      setTimeout(() => { isJumping.current = false; }, 50);
    } else {
      setActive(realIdx % n);
    }
  };

  // Start at position 0 (after clones)
  useEffect(() => { jumpTo(0); }, []);

  const prev = () => scrollToReal(((active - 1) + n) % n);
  const next = () => scrollToReal((active + 1) % n);

  return (
    <section className="screenshots-section" id="screenshots">
      <div className="section-inner">
        <div className="section-eyebrow">App Preview</div>
        <h2 className="section-title">See CentryAI in action.</h2>
        <p className="section-sub">Real screens from the app. Track activity, catch zombie subscriptions, and cancel with one tap.</p>
      </div>
      <div className="screenshots-scroll-wrap">
        <div className="screenshots-track" ref={trackRef} onScroll={handleScroll}>
          {slides.map((s, i) => (
            <div className="screenshot-slide" key={i}>
              <div className="screenshot-slide-frame">
                <img
                  src={s.src}
                  alt={s.caption}
                  loading="lazy"
                  style={{width:'100%',height:'auto',display:'block'}}
                />
              </div>
              <div className="screenshot-caption">{s.caption}</div>
            </div>
          ))}
        </div>
        <div className="screenshots-nav">
          <button className="screenshots-arrow" onClick={prev} aria-label="Previous">&#8592;</button>
          <div className="screenshots-dots-row">
            {SCREENSHOTS.map((_, i) => (
              <button
                key={i}
                className={`screenshots-dot ${active === i ? 'active' : ''}`}
                onClick={() => scrollToReal(i)}
                aria-label={`Slide ${i+1}`}
              />
            ))}
          </div>
          <button className="screenshots-arrow" onClick={next} aria-label="Next">&#8594;</button>
        </div>
      </div>
    </section>
  );
}

  };
  const [src, setSrc] = React.useState(localPaths[name]);

  const handleError = () => {

      style={{
        borderRadius: size * 0.22,
        display: 'block',
        objectFit: 'cover',
        imageRendering: 'crisp-edges',
      }}
    />
  );
};
